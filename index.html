<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boorpunt — Ground Research BV (KLIC Fixed)</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f5;padding:12px}
h1{background:#1e3a5f;color:#fff;padding:14px 20px;font-size:17px}
.info{padding:10px 20px;background:#f8f9fb;font-size:13px;display:flex;gap:20px;flex-wrap:wrap}
.info b{color:#1e3a5f}
#status{padding:8px 20px;background:#fff3e0;color:#e65100;font-size:12px;display:none}
#klicStatus{padding:8px 20px;background:#e8f5e8;color:#2e7d32;font-size:12px;display:none}
#map{width:100%;height:550px;background:#ddd;position:relative}
.ctrl{padding:8px 16px;background:#e8ecf1;display:flex;gap:6px;flex-wrap:wrap}
.ctrl button{padding:5px 12px;border:1px solid #bbb;border-radius:4px;font-size:11px;cursor:pointer;background:#fff;font-weight:600}
.ctrl button.on{background:#1e3a5f;color:#fff;border-color:#1e3a5f}
.leg{padding:8px 20px;background:#fff;font-size:11px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.leg b{color:#1e3a5f;font-size:12px}
.d{width:10px;height:10px;border-radius:50%;display:inline-block;vertical-align:middle;margin-right:3px}
table{width:100%;border-collapse:collapse;font-size:11px;background:#fff}
th{background:#1e3a5f;color:#fff;padding:5px 8px;text-align:left}
td{padding:4px 8px;border-bottom:1px solid #eee}
.klicPanel{padding:12px;background:#fff;border:1px solid #ddd;margin-top:8px;display:none;max-height:300px;overflow-y:auto}
.klicPanel h3{font-size:13px;color:#1e3a5f;margin-bottom:8px}
.klicLayer{margin:4px 0;font-size:11px}
.klicLayer label{cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.klicDebug{margin-top:8px;padding:8px;background:#f8f9fa;font-family:monospace;font-size:10px;border:1px solid #dee2e6;max-height:150px;overflow-y:auto;white-space:pre-wrap}
</style>
</head>
<body>

<h1>Boorpunt — Ground Research BV</h1>
<div class="info" id="info"></div>
<div id="status"></div>
<div id="klicStatus"></div>

<div class="ctrl" id="ctrl">
  <button class="on" onclick="sw('sat',this)">Satelliet</button>
  <button onclick="sw('hyb',this)">Hybride</button>
  <button onclick="sw('map',this)">Kaart</button>
  <button onclick="sw('osm',this)">OSM</button>
  <button onclick="tl()">Labels</button>
  <button onclick="za()">Zoom fit</button>
  <button onclick="exportPDF()" style="background:#c62828;color:#fff;border-color:#c62828">📄 PDF</button>
  <button id="addBtn" onclick="toggleAdd()" style="background:#2e7d32;color:#fff;border-color:#2e7d32">+ Punt</button>
  <button onclick="undoLast()" style="background:#e65100;color:#fff;border-color:#e65100">↩ Ongedaan</button>
  <button onclick="clearAll()" style="background:#555;color:#fff;border-color:#555">🗑️ Wis alles</button>
  <button id="measureBtn" onclick="toggleMeasure()" style="background:#6a1b9a;color:#fff;border-color:#6a1b9a">📏 Meten</button>
  <button onclick="toggleCSV()" id="csvBtn" style="background:#0277bd;color:#fff;border-color:#0277bd">📂 CSV Import</button>
  <button onclick="toggleKlic()" id="klicBtn" style="background:#ff6f00;color:#fff;border-color:#ff6f00">⚡ KLIC</button>
</div>

<div class="leg" id="leg">
  <b>Legenda:</b>
  <span title="Boringen"><div class="d" style="background:#1976d2"></div>Boring</span>
  <span title="Peilbuizen"><div class="d" style="background:#ff8f00"></div>Peilbuis</span>
  <span title="Handmatig toegevoegd"><div class="d" style="background:#c62828"></div>Handmatig</span>
</div>

<div id="map"></div>

<!-- CSV/Excel Import Panel -->
<div id="importPanel" style="padding:8px 20px;background:#e3f2fd;display:none">
  <input type="file" id="importFile" accept=".csv,.xlsx,.xls" multiple />
  <button onclick="doImport()" style="padding:4px 12px;margin-left:8px;background:#1976d2;color:#fff;border:none;border-radius:4px;cursor:pointer">Import</button>
  <button onclick="document.getElementById('importPanel').style.display='none'" style="padding:4px 12px;margin-left:8px;background:#666;color:#fff;border:none;border-radius:4px;cursor:pointer">Sluiten</button>
  <p style="font-size:11px;margin-top:6px;color:#555">Sleep CSV/Excel bestanden op de kaart of gebruik de knop</p>
</div>

<!-- KLIC Import Panel -->
<div id="klicPanel" style="padding:8px 20px;background:#fff8e1;display:none">
  <input type="file" id="klicFile" accept=".zip" />
  <button onclick="doKlicImport()" style="padding:4px 12px;margin-left:8px;background:#ff8f00;color:#fff;border:none;border-radius:4px;cursor:pointer">Import KLIC ZIP</button>
  <button onclick="document.getElementById('klicPanel').style.display='none'" style="padding:4px 12px;margin-left:8px;background:#666;color:#fff;border:none;border-radius:4px;cursor:pointer">Sluiten</button>
  <div id="klicLayers" class="klicPanel"></div>
  <div id="klicDebug" class="klicDebug" style="display:none"></div>
  <button onclick="toggleKlicDebug()" style="padding:2px 8px;margin-top:6px;background:#666;color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:10px">Debug</button>
</div>

<div id="pointList"></div>

<script>
// === GLOBALE VARIABELEN ===
var map,tilesLayer,labelLayer;
var markers=[];
var addMode=false;
var klicLayers=[];

// Debug functie
function debugLog(msg) {
  console.log('KLIC Debug:', msg);
  const debugEl = document.getElementById('klicDebug');
  if (debugEl) {
    debugEl.textContent += new Date().toLocaleTimeString() + ': ' + msg + '\n';
  }
}

function toggleKlicDebug() {
  const debugEl = document.getElementById('klicDebug');
  debugEl.style.display = debugEl.style.display === 'none' ? 'block' : 'none';
}

// === KAART INITIALISATIE ===
function initMap(){
  map=L.map('map',{zoomControl:false}).setView([52.5,5.7],8);
  L.control.zoom({position:'topright'}).addTo(map);
  
  sw('sat');
  updateInfo();
  updateList();
  
  // Drag & drop support
  map.getContainer().addEventListener('dragover',function(e){e.preventDefault();});
  map.getContainer().addEventListener('drop',function(e){
    e.preventDefault();
    for(var fi=0;fi<e.dataTransfer.files.length;fi++){
      var f=e.dataTransfer.files[fi];
      if(f.name.match(/\.zip$/i)) processKlicZip(f);
      else if(f.name.match(/\.(csv|xlsx|xls)$/i)) processImportFile(f);
    }
  });
}

// === KAARTLAGEN ===
function sw(type,btn){
  var buttons=document.querySelectorAll('.ctrl button');
  buttons.forEach(function(b){b.classList.remove('on');});
  if(btn) btn.classList.add('on');
  
  if(tilesLayer) map.removeLayer(tilesLayer);
  if(type==='sat') tilesLayer=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'ESRI'});
  else if(type==='hyb') tilesLayer=L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}',{attribution:'Google Hybrid'});
  else if(type==='map') tilesLayer=L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{attribution:'Google Maps'});
  else tilesLayer=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'OpenStreetMap'});
  tilesLayer.addTo(map);
}

function tl(){
  if(labelLayer){map.removeLayer(labelLayer);labelLayer=null;}
  else {labelLayer=L.tileLayer('https://mt1.google.com/vt/lyrs=h&x={x}&y={y}&z={z}',{attribution:'Google Labels'});labelLayer.addTo(map);}
}

function za(){
  if(markers.length>0) map.fitBounds(L.featureGroup(markers).getBounds().pad(0.1));
  else map.setView([52.5,5.7],8);
}

// === INFO UPDATE ===
function updateInfo(){
  var boringen=markers.filter(function(m){return m.type==='boring';}).length;
  var peilbuizen=markers.filter(function(m){return m.type==='peilbuis';}).length;
  var handmatig=markers.filter(function(m){return m.type==='handmatig';}).length;
  document.getElementById('info').innerHTML='<b>Totaal:</b> '+(boringen+peilbuizen+handmatig)+' punten &nbsp;|&nbsp; <b>Boringen:</b> '+boringen+' &nbsp;|&nbsp; <b>Peilbuizen:</b> '+peilbuizen+' &nbsp;|&nbsp; <b>Handmatig:</b> '+handmatig;
}

// === PUNTEN BEHEER ===
function addPoint(lat,lng,type,diepte,diameter,beschrijving){
  var color=type==='peilbuis'?'#ff8f00':type==='handmatig'?'#c62828':'#1976d2';
  var marker=L.circleMarker([lat,lng],{radius:6,fillColor:color,color:'#fff',weight:2,fillOpacity:0.9});
  marker.type=type;
  marker.diepte=diepte||'';
  marker.diameter=diameter||'';
  marker.beschrijving=beschrijving||'';
  marker.addTo(map);
  marker.bindPopup('<b>'+type.charAt(0).toUpperCase()+type.slice(1)+'</b><br>'+(diepte?'Diepte: '+diepte+'m<br>':'')+(diameter?'Diameter: '+diameter+'mm<br>':'')+(beschrijving?beschrijving:'Lat: '+lat.toFixed(6)+', Lng: '+lng.toFixed(6)));
  markers.push(marker);
  updateInfo();
  updateList();
}

function undoLast(){
  if(markers.length===0) return;
  var last=markers.pop();
  map.removeLayer(last);
  updateInfo();
  updateList();
}

function clearAll(){
  if(!confirm('Alle punten wissen?')) return;
  markers.forEach(function(m){map.removeLayer(m);});
  markers=[];
  updateInfo();
  updateList();
}

function updateList(){
  var html='<table><thead><tr><th>#</th><th>Type</th><th>Coördinaten</th><th>Diepte</th><th>Ø</th></tr></thead><tbody>';
  markers.forEach(function(m,i){
    var ll=m.getLatLng();
    html+='<tr><td>'+(i+1)+'</td><td style="color:'+m.options.fillColor+'">'+m.type+'</td><td>'+ll.lat.toFixed(6)+', '+ll.lng.toFixed(6)+'</td><td>'+m.diepte+'</td><td>'+m.diameter+'</td></tr>';
  });
  html+='</tbody></table>';
  document.getElementById('pointList').innerHTML=html;
}

// === HANDMATIG PUNTEN TOEVOEGEN ===
function toggleAdd(){
  addMode=!addMode;
  var btn=document.getElementById('addBtn');
  if(addMode){
    btn.style.background='#c62828';btn.textContent='+ Punt (klik kaart)';
    map.getContainer().style.cursor='crosshair';
  } else {
    btn.style.background='#2e7d32';btn.textContent='+ Punt';
    map.getContainer().style.cursor='';
  }
}

map.on('click',function(e){
  if(!addMode) return;
  addPoint(e.latlng.lat,e.latlng.lng,'handmatig');
  toggleAdd();
});

// === CSV/EXCEL IMPORT ===
function toggleCSV(){
  var panel=document.getElementById('importPanel');
  panel.style.display=panel.style.display==='none'?'block':'none';
}

function doImport(){
  var files=document.getElementById('importFile').files;
  for(var fi=0;fi<files.length;fi++) processImportFile(files[fi]);
}

function processImportFile(file){
  if(file.name.match(/\.csv$/i)) processCSV(file);
  else if(file.name.match(/\.(xlsx|xls)$/i)) processExcel(file);
}

function processCSV(file){
  var reader=new FileReader();
  reader.onload=function(e){
    var lines=e.target.result.split('\n');
    var header=lines[0].toLowerCase().split(/[;,]/);
    var nrCol=findCol(header,['nr','nummer','id','#']);
    var xCol=findCol(header,['x','rd_x','rdx','oost']);
    var yCol=findCol(header,['y','rd_y','rdy','noord']);
    var typeCol=findCol(header,['type','soort','kind']);
    var diepteCol=findCol(header,['diepte','depth','diepte_m','einddiepte']);
    var diameterCol=findCol(header,['diameter','dia','d','doorsnede']);
    
    for(var li=1;li<lines.length;li++){
      var cols=lines[li].split(/[;,]/);
      if(cols.length<2) continue;
      var x=parseFloat(cols[xCol]||0);
      var y=parseFloat(cols[yCol]||0);
      if(x<10000||y<100000) continue;
      var ll=rd(x,y);
      var type=detectType(cols[typeCol]||'');
      var diepte=cols[diepteCol]||'';
      var diameter=cols[diameterCol]||'';
      addPoint(ll[0],ll[1],type,diepte,diameter);
    }
  };
  reader.readAsText(file);
}

function processExcel(file){
  var reader=new FileReader();
  reader.onload=function(e){
    var wb=XLSX.read(e.target.result,{type:'array'});
    var ws=wb.Sheets[wb.SheetNames[0]];
    var json=XLSX.utils.sheet_to_json(ws);
    
    json.forEach(function(row){
      var keys=Object.keys(row).map(function(k){return k.toLowerCase();});
      var x=row[keys.find(function(k){return k.match(/(^x$|rd_?x|oost)/);})];
      var y=row[keys.find(function(k){return k.match(/(^y$|rd_?y|noord)/);})];
      var type=row[keys.find(function(k){return k.match(/(type|soort|kind)/);})];
      var diepte=row[keys.find(function(k){return k.match(/(diepte|depth)/);})];
      var diameter=row[keys.find(function(k){return k.match(/(diameter|dia|doorsnede)/);})];
      
      if(x&&y&&x>10000&&y>100000){
        var ll=rd(x,y);
        addPoint(ll[0],ll[1],detectType(type||''),diepte||'',diameter||'');
      }
    });
  };
  reader.readAsArrayBuffer(file);
}

function findCol(header,names){
  for(var ni=0;ni<names.length;ni++){
    var idx=header.indexOf(names[ni]);
    if(idx>=0) return idx;
  }
  return -1;
}

function detectType(str){
  var s=(str||'').toLowerCase();
  if(s.match(/pb|peil|monitoring|moni/)) return 'peilbuis';
  return 'boring';
}

// === RD NAAR WGS84 CONVERSIE ===
function rd(x,y){
  var x0=155000,y0=463000,phi0=52.15517440,lam0=5.38720621;
  var dphi,dlam,phi,lam;
  var dx=(x-x0)*1e-5,dy=(y-y0)*1e-5;
  dphi=3235.65389*dy-32.58297*dx*dx-0.2475*dy*dy-0.84978*dx*dx*dy-0.0655*dy*dy*dy-0.01709*dx*dx*dx*dx-0.00738*dx*dy*dy*dy;
  dlam=5260.52916*dx+105.94684*dx*dy+2.45656*dx*dy*dy-0.81885*dx*dx*dx+0.05594*dx*dy*dy*dy-0.05607*dx*dx*dx*dy+0.01199*dy*dy*dy*dy;
  phi=phi0+dphi/3600;lam=lam0+dlam/3600;
  return [phi,lam];
}

// === KLIC IMPORT ===
function toggleKlic(){
  var panel=document.getElementById('klicPanel');
  panel.style.display=panel.style.display==='none'?'block':'none';
}

function doKlicImport(){
  var file=document.getElementById('klicFile').files[0];
  if(!file) return;
  processKlicZip(file);
}

function processKlicZip(file){
  var statusEl = document.getElementById('klicStatus');
  statusEl.style.display='block';
  statusEl.style.color='#e65100';
  statusEl.textContent='KLIC laden: '+file.name+'...';
  
  debugLog('Start verwerking: ' + file.name);
  
  var reader=new FileReader();
  reader.onload=function(e){
    JSZip.loadAsync(e.target.result).then(function(zip){
      debugLog('ZIP geladen');
      
      var xmlFiles=[];
      var pngFiles=[];
      
      zip.forEach(function(path,entry){
        if(!entry.dir){
          debugLog('Bestand gevonden: ' + path);
          if(path.toLowerCase().endsWith('.xml')) xmlFiles.push({path:path,entry:entry});
          if(path.toLowerCase().endsWith('.png')) pngFiles.push({path:path,entry:entry});
        }
      });
      
      debugLog('Gevonden ' + xmlFiles.length + ' XML bestanden, ' + pngFiles.length + ' PNG bestanden');
      statusEl.textContent='Gevonden: '+xmlFiles.length+' XML, '+pngFiles.length+' PNG bestanden...';
      
      if(xmlFiles.length === 0){
        statusEl.style.color='#c62828';
        statusEl.textContent='Geen XML bestanden gevonden in KLIC ZIP';
        debugLog('Geen XML bestanden!');
        return;
      }
      
      var klicEntry = {name: file.name.replace(/\.zip$/i,''), layers: [], overlays: []};
      var promises = [];
      
      // Verwerk XML bestanden
      xmlFiles.forEach(function(xf){
        promises.push(xf.entry.async('text').then(function(text){
          debugLog('XML gelezen: ' + xf.path + ' (' + text.length + ' chars)');
          parseKlicXML(text, xf.path, klicEntry);
        }));
      });
      
      Promise.all(promises).then(function(){
        debugLog('Alle XML bestanden verwerkt');
        klicLayers.push(klicEntry);
        
        var layerCount = klicEntry.layers.length;
        statusEl.style.color = layerCount > 0 ? '#2e7d32' : '#ff8f00';
        statusEl.innerHTML = '✅ ' + file.name + ': ' + layerCount + ' lagen geladen';
        
        debugLog('Totaal ' + layerCount + ' lagen toegevoegd');
        klicEntry.layers.forEach(function(layer){
          debugLog('Laag: ' + layer.name + ' (' + layer.type + ')');
        });
        
        updateKlicPanel();
        
        // Zoom naar KLIC gebied
        if(klicEntry.overlays.length > 0){
          var group = L.featureGroup(klicEntry.overlays);
          map.fitBounds(group.getBounds().pad(0.1));
          debugLog('Gezoomd naar KLIC gebied');
        }
      });
      
    }).catch(function(err){
      statusEl.style.color='#c62828';
      statusEl.textContent='Fout bij ZIP laden: '+err.message;
      debugLog('ZIP fout: ' + err.message);
    });
  };
  reader.readAsArrayBuffer(file);
}

function parseKlicXML(text, path, klicEntry){
  try {
    debugLog('Parse XML: ' + path);
    
    var parser = new DOMParser();
    var doc = parser.parseFromString(text, 'text/xml');
    
    // Check voor parsing errors
    var parseError = doc.querySelector('parsererror');
    if (parseError) {
      debugLog('XML parsing error: ' + parseError.textContent);
      return;
    }
    
    debugLog('XML parsing OK');
    
    // 1. Zoek graafpolygoon
    var graafElements = getAllElementsByLocalName(doc, 'Graafpolygoon');
    debugLog('Gevonden ' + graafElements.length + ' Graafpolygoon elementen');
    
    graafElements.forEach(function(el, idx){
      var coords = extractCoordinates(el);
      if (coords.length >= 3) {
        var poly = L.polygon(coords, {
          color: '#ff6f00', 
          weight: 3, 
          fillColor: '#ff6f00', 
          fillOpacity: 0.1, 
          dashArray: '8,4'
        });
        poly.addTo(map);
        poly.bindPopup('<b>Graafgebied</b><br>KLIC melding: ' + path);
        
        klicEntry.layers.push({
          name: 'Graafgebied ' + (idx + 1),
          overlay: poly,
          type: 'polygon',
          color: '#ff6f00'
        });
        klicEntry.overlays.push(poly);
        
        debugLog('Graafpolygoon toegevoegd met ' + coords.length + ' punten');
      }
    });
    
    // 2. Zoek UtilityLink elementen (leidingen)
    var utilityLinks = getAllElementsByLocalName(doc, 'UtilityLink');
    debugLog('Gevonden ' + utilityLinks.length + ' UtilityLink elementen');
    
    var netGroups = {};
    
    utilityLinks.forEach(function(ul){
      // Probeer netwerk type te bepalen
      var netInfo = determineNetworkType(ul, text);
      var groupKey = netInfo.label;
      
      if (!netGroups[groupKey]) {
        netGroups[groupKey] = {
          color: netInfo.color,
          label: netInfo.label,
          lines: []
        };
      }
      
      // Extract geometrie
      var coords = extractCoordinates(ul);
      if (coords.length >= 2) {
        netGroups[groupKey].lines.push(coords);
      }
    });
    
    // Maak lagen per netwerk groep
    Object.keys(netGroups).forEach(function(key){
      var grp = netGroups[key];
      if (grp.lines.length === 0) return;
      
      var multiLine = L.polyline(grp.lines, {
        color: grp.color,
        weight: 3,
        opacity: 0.8
      });
      multiLine.addTo(map);
      multiLine.bindPopup('<b>' + grp.label + '</b><br>' + grp.lines.length + ' segmenten');
      
      klicEntry.layers.push({
        name: grp.label,
        overlay: multiLine,
        type: 'line',
        color: grp.color
      });
      klicEntry.overlays.push(multiLine);
      
      debugLog('Netwerk laag: ' + grp.label + ' met ' + grp.lines.length + ' segmenten');
    });
    
  } catch (e) {
    debugLog('XML parse fout: ' + e.message);
  }
}

function getAllElementsByLocalName(doc, localName) {
  var results = [];
  var all = doc.getElementsByTagName('*');
  for (var i = 0; i < all.length; i++) {
    if (all[i].localName === localName) {
      results.push(all[i]);
    }
  }
  return results;
}

function extractCoordinates(element) {
  var coords = [];
  var posLists = getAllElementsByLocalName(element, 'posList');
  
  posLists.forEach(function(posList){
    var text = posList.textContent.trim();
    if (text) {
      var parsedCoords = parseRDCoords(text);
      coords = coords.concat(parsedCoords);
    }
  });
  
  return coords;
}

function parseRDCoords(text) {
  var nums = text.trim().split(/[\s,]+/).map(parseFloat).filter(function(n){
    return !isNaN(n);
  });
  
  if (nums.length < 2) return [];
  
  var coords = [];
  // Verwerk paren van x,y coördinaten (mogelijk met z)
  for (var i = 0; i < nums.length - 1; i += 2) {
    var x = nums[i];
    var y = nums[i + 1];
    
    // Check of het RD coördinaten zijn
    if (x > 10000 && y > 100000) {
      var wgs = rd(x, y);
      coords.push([wgs[0], wgs[1]]);
    }
  }
  
  return coords;
}

function determineNetworkType(utilityLink, fullText) {
  // Standaard kleuren per type
  var types = {
    'elektra': {color: '#e53935', label: 'Elektra'},
    'gas': {color: '#fdd835', label: 'Gas'},
    'water': {color: '#1e88e5', label: 'Water'},
    'telecom': {color: '#43a047', label: 'Telecom'},
    'riool': {color: '#6d4c41', label: 'Riool'},
    'warmte': {color: '#ff6f00', label: 'Warmte'}
  };
  
  // Probeer type te detecteren uit element inhoud
  var content = utilityLink.textContent.toLowerCase();
  var elemString = new XMLSerializer().serializeToString(utilityLink).toLowerCase();
  
  if (elemString.indexOf('electricity') > -1 || content.indexOf('elektr') > -1) {
    return types.elektra;
  }
  if (elemString.indexOf('gas') > -1 || elemString.indexOf('oil') > -1) {
    return types.gas;
  }
  if (elemString.indexOf('water') > -1) {
    return types.water;
  }
  if (elemString.indexOf('telecom') > -1 || elemString.indexOf('communication') > -1) {
    return types.telecom;
  }
  if (elemString.indexOf('sewer') > -1 || content.indexOf('riool') > -1) {
    return types.riool;
  }
  if (elemString.indexOf('thermal') > -1 || content.indexOf('warmte') > -1) {
    return types.warmte;
  }
  
  // Default
  return {color: '#666666', label: 'Onbekend'};
}

function updateKlicPanel() {
  var layersEl = document.getElementById('klicLayers');
  if (!layersEl) return;
  
  var html = '<h3>KLIC Lagen</h3>';
  
  klicLayers.forEach(function(klicFile, fileIdx){
    html += '<div style="margin:8px 0;padding:6px;background:#f8f9fa;border-left:3px solid #ff8f00"><b>' + klicFile.name + '</b>';
    
    klicFile.layers.forEach(function(layer, layerIdx){
      var colorBox = '<span style="display:inline-block;width:12px;height:3px;background:' + layer.color + ';margin-right:4px;border-radius:1px"></span>';
      html += '<div class="klicLayer"><label>';
      html += '<input type="checkbox" checked onchange="toggleKlicLayer(' + fileIdx + ',' + layerIdx + ',this.checked)" style="margin-right:4px">';
      html += colorBox + layer.name;
      html += '</label></div>';
    });
    
    html += '</div>';
  });
  
  if (klicLayers.length === 0) {
    html += '<p style="color:#666;font-style:italic">Geen KLIC lagen geladen</p>';
  }
  
  layersEl.innerHTML = html;
  document.getElementById('klicPanel').style.display = 'block';
}

window.toggleKlicLayer = function(fileIdx, layerIdx, visible) {
  var layer = klicLayers[fileIdx].layers[layerIdx];
  if (layer.overlay) {
    if (visible) {
      layer.overlay.addTo(map);
    } else {
      map.removeLayer(layer.overlay);
    }
  }
};

// === PDF EXPORT ===
function exportPDF(){
  if(markers.length===0){alert('Geen punten om te exporteren');return;}
  var {jsPDF}=window.jspdf;
  var pdf=new jsPDF();
  pdf.setFontSize(16);
  pdf.text('Boorpunt Overzicht — Ground Research BV',20,20);
  pdf.setFontSize(10);
  pdf.text('Gegenereerd: '+new Date().toLocaleDateString('nl-NL'),20,30);
  var y=45;
  pdf.text('#',20,y);pdf.text('Type',30,y);pdf.text('Lat',60,y);pdf.text('Lng',90,y);pdf.text('Diepte',120,y);pdf.text('Diameter',140,y);
  markers.forEach(function(m,i){
    y+=7;if(y>270){pdf.addPage();y=20;}
    var ll=m.getLatLng();
    pdf.text(''+(i+1),20,y);
    pdf.text(m.type,30,y);
    pdf.text(ll.lat.toFixed(6),60,y);
    pdf.text(ll.lng.toFixed(6),90,y);
    pdf.text(m.diepte||'-',120,y);
    pdf.text(m.diameter||'-',140,y);
  });
  pdf.save('boorpunten-'+new Date().toISOString().slice(0,10)+'.pdf');
}

// === METEN FUNCTIONALITEIT ===
var measureMode = false;
var measurePoints = [];
var measureMarkers = [];
var measureLines = [];

function toggleMeasure() {
  if (addMode) toggleAdd();
  
  measureMode = !measureMode;
  var btn = document.getElementById('measureBtn');
  if (measureMode) {
    btn.style.background = '#4a148c';
    btn.textContent = '📏 Meten... (klik)';
    map.getContainer().style.cursor = 'crosshair';
    clearMeasure();
  } else {
    btn.style.background = '#6a1b9a';
    btn.textContent = '📏 Meten';
    map.getContainer().style.cursor = '';
  }
}

function clearMeasure() {
  measurePoints = [];
  measureMarkers.forEach(function(m){ map.removeLayer(m); });
  measureLines.forEach(function(l){ map.removeLayer(l); });
  measureMarkers = [];
  measureLines = [];
}

map.on('click', function(e) {
  if (!measureMode) return;
  
  var ll = [e.latlng.lat, e.latlng.lng];
  measurePoints.push(ll);
  
  // Plaats marker
  var marker = L.circleMarker(ll, {
    radius: 4,
    fillColor: '#6a1b9a',
    color: '#fff',
    weight: 2,
    fillOpacity: 1
  }).addTo(map);
  measureMarkers.push(marker);
  
  // Teken lijn naar vorige punt
  if (measurePoints.length >= 2) {
    var prev = measurePoints[measurePoints.length - 2];
    var line = L.polyline([prev, ll], {
      color: '#6a1b9a',
      weight: 3,
      dashArray: '8,6'
    }).addTo(map);
    measureLines.push(line);
    
    // Bereken afstand
    var dist = map.distance(prev, ll);
    var label = dist < 1000 ? dist.toFixed(1) + 'm' : (dist/1000).toFixed(3) + 'km';
    
    // Label op middelpunt
    var midLat = (prev[0] + ll[0]) / 2;
    var midLng = (prev[1] + ll[1]) / 2;
    var labelMarker = L.marker([midLat, midLng], {
      icon: L.divIcon({
        className: '',
        html: '<div style="background:rgba(255,255,255,0.9);padding:2px 4px;border:1px solid #6a1b9a;border-radius:3px;font-size:10px;font-weight:bold;color:#4a148c">' + label + '</div>',
        iconSize: [0, 0]
      })
    }).addTo(map);
    measureMarkers.push(labelMarker);
  }
});
